name: Diagnose Android Build

on:
  workflow_dispatch:
  push:
    paths:
      - "src/**"
      - "CMakeLists.txt"
      - "mod.json"
      - ".github/workflows/diagnose-android.yml"

permissions:
  contents: write

jobs:
  diagnose-android64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Geode CLI
        uses: geode-sdk/cli/.github/actions/setup@main
        with:
          version: latest

      - name: Setup Geode SDK
        shell: bash
        run: |
          set -e
          export CLI_PROFILE="$GITHUB_WORKSPACE/cli-profile"
          mkdir -p "$CLI_PROFILE/geode/mods"
          geode profile add --name GithubActions "$CLI_PROFILE/GeometryDash.exe" win
          geode sdk install "$GITHUB_WORKSPACE/geode-sdk-clone"
          export GEODE_SDK="$GITHUB_WORKSPACE/geode-sdk-clone"
          echo "GEODE_SDK=$GEODE_SDK" >> "$GITHUB_ENV"
          geode sdk update v5.8.1
          geode sdk install-binaries --platform android64

      - name: Build and capture diagnostics
        id: diagnose
        shell: bash
        run: |
          set +e
          NDK_PATH="$ANDROID_NDK_LATEST_HOME"
          rm -rf build
          {
            echo "=== CMAKE CONFIGURE ==="
            cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_COMPILER=clang \
              -DCMAKE_CXX_COMPILER=clang++ \
              -DGEODE_CODEGEN_CMAKE_ARGS="-DCMAKE_C_COMPILER=clang;-DCMAKE_CXX_COMPILER=clang++;-G Ninja" \
              -G Ninja \
              -DCMAKE_TOOLCHAIN_FILE="$NDK_PATH/build/cmake/android.toolchain.cmake" \
              -DANDROID_STL=c++_shared \
              -DANDROID_ABI=arm64-v8a \
              -DANDROID_PLATFORM=android-23 \
              -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
              -DGEODE_DONT_INSTALL_MODS=ON \
              -DGEODE_TARGET_PLATFORM=Android64
            configure_status=$?
            echo "CONFIGURE_EXIT=$configure_status"
            if [ "$configure_status" -eq 0 ]; then
              echo "=== CMAKE BUILD ==="
              cmake --build build --config Release --parallel
              build_status=$?
            else
              build_status=$configure_status
            fi
            echo "BUILD_EXIT=$build_status"
          } > ci-full.log 2>&1

          tail -n 300 ci-full.log > ci-error.txt
          cat ci-error.txt
          echo "exit_code=$build_status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit diagnostic log
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci-error.txt
          git commit -m "Add Android build diagnostic log" || exit 0
          git push
