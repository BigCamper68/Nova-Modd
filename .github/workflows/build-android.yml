name: Build Nova Menu Android64

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "CMakeLists.txt"
      - "mod.json"
      - ".github/workflows/build-android.yml"

jobs:
  android64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Android64 mod
        id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: 5.8.1
          target: Android64

      - name: Upload Android64 package
        uses: actions/upload-artifact@v4
        with:
          name: Nova-Menu-Android64
          path: ${{ steps.build.outputs.build-output }}
